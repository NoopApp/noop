name: Strand
options:
  bundleIdPrefix: com.noopapp
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top
  # Base/development language. The in-source UI strings are authored in English (US);
  # the String Catalog (Strand/Resources/Localizable.xcstrings) carries this as the
  # source language and is where additional languages are added.
  developmentLanguage: en
settings:
  base:
    MARKETING_VERSION: "1.33"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Emit localizable strings so Xcode auto-extracts every LocalizedStringKey into the
    # String Catalog on build (the English (US) base entries).
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    # Emit localizable strings so Xcode auto-extracts every LocalizedStringKey into the
    # String Catalog on build (the English (US) base entries).
    SWIFT_EMIT_LOC_STRINGS: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Build for both Apple Silicon and Intel so the release runs on every Mac.
    ARCHS: "$(ARCHS_STANDARD)"
  configs:
    Release:
      # Distribution builds must produce a universal binary, not just the host arch.
      ONLY_ACTIVE_ARCH: NO
packages:
  WhoopProtocol:
    path: Packages/WhoopProtocol
  WhoopStore:
    path: Packages/WhoopStore
  StrandAnalytics:
    path: Packages/StrandAnalytics
  StrandImport:
    path: Packages/StrandImport
  StrandDesign:
    path: Packages/StrandDesign
targets:
  Strand:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Strand
        excludes:
          - "Resources/Info.plist"
          - "Resources/Strand.entitlements"
    info:
      path: Strand/Resources/Info.plist
      properties:
        CFBundleName: NOOP
        CFBundleDisplayName: NOOP
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "28"
        LSMinimumSystemVersion: "13.0"
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        NSBluetoothAlwaysUsageDescription: "NOOP connects directly to your WHOOP strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your Mac. Nothing leaves your device."
    entitlements:
      path: Strand/Resources/Strand.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.bluetooth: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noopapp.noop
        PRODUCT_NAME: NOOP
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        # Hardened Runtime closes the DYLD_INSERT_LIBRARIES injection vector for the
        # distributed (ad-hoc) build. The app uses no JIT / unsigned-exec memory, so it's safe.
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - package: StrandAnalytics
      - package: StrandImport
      - package: StrandDesign
  StrandTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - StrandTests
    dependencies:
      - target: Strand
      - package: WhoopProtocol
      - package: WhoopStore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.noopapp.strandtests

  # ---------------------------------------------------------------------------
  # iOS app target. Reuses the five shared packages and almost all of Strand/
  # (the SwiftUI screens, BLE engine, collector, data layer) unchanged; only the
  # macOS-only scene/menu-bar/notification files are excluded, and the iOS-only
  # app shell + HealthKit + widgets/intents live under StrandiOS/.
  NOOPiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Strand
        excludes:
          - "Resources/Info.plist"
          - "Resources/Strand.entitlements"
          - "Resources/Assets.xcassets"
          - "App/StrandApp.swift"
          - "App/RootView.swift"
          - "MenuBar"
          - "Data/NotificationSettingsStore.swift"
          - "Screens/NotificationSettingsView.swift"
      - path: StrandiOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/NOOP.entitlements"
      - path: StrandiOSShared
    info:
      path: StrandiOS/Resources/Info.plist
      properties:
        CFBundleName: NOOP
        CFBundleDisplayName: NOOP
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "25"
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - bluetooth-central
        NSBluetoothAlwaysUsageDescription: "NOOP connects directly to your WHOOP strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your iPhone. Nothing leaves your device."
        NSHealthShareUsageDescription: "NOOP reads your own Apple Health data on-device to compute recovery, strain, and sleep. Nothing leaves your device."
        NSHealthUpdateUsageDescription: "NOOP writes the metrics it computes from your strap back into Apple Health, on-device and only when you allow it."
    entitlements:
      path: StrandiOS/Resources/NOOP.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.noopapp.noop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noopapp.noop
        PRODUCT_NAME: NOOP
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - package: StrandAnalytics
      - package: StrandImport
      - package: StrandDesign
      - target: NOOPiOSWidgets

  # ---------------------------------------------------------------------------
  # WidgetKit + Live Activity extension. Renders the glanceable widget (the iOS
  # analogue of the macOS menu-bar extra) and the live-HR Live Activity. Reads a
  # tiny snapshot the app publishes into the shared App Group — never the DB.
  NOOPiOSWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StrandiOSWidgets
        excludes:
          - "Info.plist"
          - "NOOPWidgets.entitlements"
      - path: StrandiOSShared
    info:
      path: StrandiOSWidgets/Info.plist
      properties:
        CFBundleDisplayName: NOOP
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: StrandiOSWidgets/NOOPWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.noopapp.noop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noopapp.noop.widgets
        PRODUCT_NAME: NOOPWidgets
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: StrandDesign
