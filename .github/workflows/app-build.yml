# Compile-only verification for the macOS and iOS app targets.
#
# Why this exists: the iOS app is a build-from-source community port (no App Store —
# NOOP stays anonymous), so it isn't exercised on a device by the maintainer. This job
# compiles both app targets on every relevant change so a shared-code change can't
# silently break iOS (or regress macOS). It is anonymity-safe: CODE_SIGNING_ALLOWED=NO,
# no secrets, no signing identity, no artifacts uploaded — it only checks that it builds.
# (The shipped macOS .app is still produced and anonymized by hand; this is a compile gate.)
#
# A second job (update-altstore-source) runs only when a GitHub Release is published.
# It looks for a *-ios.ipa asset on the release, measures its size, prepends a new
# version entry to altstore-source.json, and commits the result back to main so the
# AltStore source URL always reflects the latest release automatically.
name: App build (macOS + iOS)

on:
  pull_request:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'project.yml'
      - '.github/workflows/app-build.yml'
  push:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'project.yml'
      - '.github/workflows/app-build.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: app-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'release'
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: Strand
            destination: 'platform=macOS'
          - scheme: NOOPiOS
            destination: 'generic/platform=iOS Simulator'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build ${{ matrix.scheme }}
        run: >-
          xcodebuild -scheme '${{ matrix.scheme }}' -configuration Debug
          -destination '${{ matrix.destination }}'
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          build

  # ---------------------------------------------------------------------------
  # Runs only when a GitHub Release is published.
  # Finds the *-ios.ipa asset, measures its byte size, and prepends a new
  # version entry to altstore-source.json, then commits back to main.
  # ---------------------------------------------------------------------------
  update-altstore-source:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated source file

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find iOS IPA asset and build version entry
        id: build_entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail

          # ---- locate the IPA asset ----------------------------------------
          ASSET_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            | jq '[.assets[] | select(.name | test("-ios\\.ipa$"; "i"))]')

          ASSET_COUNT=$(echo "$ASSET_JSON" | jq 'length')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "No *-ios.ipa asset found on release $TAG — skipping AltStore source update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          ASSET_NAME=$(echo "$ASSET_JSON" | jq -r '.[0].name')
          ASSET_URL=$(echo "$ASSET_JSON"  | jq -r '.[0].url')
          ASSET_SIZE=$(echo "$ASSET_JSON" | jq -r '.[0].size')

          # ---- derive version number from tag (strip leading 'v') -----------
          VERSION="${TAG#v}"

          # ---- ISO date from published_at (YYYY-MM-DD) ----------------------
          ISO_DATE=$(echo "$RELEASE_DATE" | cut -c1-10)

          # ---- sanitise release body for JSON (escape quotes/backslashes) ---
          DESCRIPTION=$(echo "$RELEASE_BODY" \
            | sed 's/\\/\\\\/g' \
            | sed 's/"/\\"/g' \
            | sed ':a;N;$!ba;s/\n/\\n/g')

          # ---- build the download URL from the standard GitHub releases path-
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET_NAME}"

          # ---- download IPA and extract CFBundleVersion from Info.plist ------
          echo "Downloading IPA to read CFBundleVersion..."
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "*-ios.ipa" --output noop.ipa
          unzip -q noop.ipa "Payload/*.app/Info.plist" -d ipa_extracted
          INFO_PLIST=$(find ipa_extracted/Payload -name Info.plist | head -1)
          BUILD_VERSION=$(python3 -c "import plistlib,sys; p=plistlib.load(open(sys.argv[1],'rb')); print(p['CFBundleVersion'])" "$INFO_PLIST")
          rm -rf noop.ipa ipa_extracted
          echo "CFBundleVersion: $BUILD_VERSION"

          # ---- emit outputs -------------------------------------------------
          echo "version=$VERSION"             >> "$GITHUB_OUTPUT"
          echo "date=$ISO_DATE"               >> "$GITHUB_OUTPUT"
          echo "size=$ASSET_SIZE"             >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL"   >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          # Store description in an env file to preserve newlines
          {
            echo "ENTRY_DESCRIPTION<<EOF"
            echo "$RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_ENV"

          echo "Found IPA: $ASSET_NAME ($ASSET_SIZE bytes) → $DOWNLOAD_URL"

      - name: Prepend version to altstore-source.json
        if: steps.build_entry.outputs.skip != 'true'
        env:
          VERSION:         ${{ steps.build_entry.outputs.version }}
          DATE:            ${{ steps.build_entry.outputs.date }}
          SIZE:            ${{ steps.build_entry.outputs.size }}
          DOWNLOAD_URL:    ${{ steps.build_entry.outputs.download_url }}
          BUILD_VERSION:   ${{ steps.build_entry.outputs.build_version }}
        run: |
          set -euo pipefail

          SOURCE_FILE="altstore-source.json"

          # Build the new version object. jq handles all JSON escaping.
          NEW_VERSION=$(jq -n \
            --arg version      "$VERSION" \
            --arg buildVersion "$BUILD_VERSION" \
            --arg date         "$DATE" \
            --arg desc         "$ENTRY_DESCRIPTION" \
            --arg url          "$DOWNLOAD_URL" \
            --argjson size     "$SIZE" \
            '{
              version:            $version,
              buildVersion:       $buildVersion,
              date:               $date,
              localizedDescription: $desc,
              downloadURL:        $url,
              size:               $size,
              minOSVersion:       "16.0"
            }')

          # Prepend into apps[0].versions array (index 0 = latest per AltStore spec)
          jq --argjson entry "$NEW_VERSION" \
            '.apps[0].versions = [$entry] + .apps[0].versions' \
            "$SOURCE_FILE" > tmp_source.json && mv tmp_source.json "$SOURCE_FILE"

          echo "Updated $SOURCE_FILE — new head version: $VERSION"
          jq '.apps[0].versions[0]' "$SOURCE_FILE"

      - name: Commit and push updated source
        if: steps.build_entry.outputs.skip != 'true'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git commit -m "chore: update AltStore source for $TAG"
          git push origin main
