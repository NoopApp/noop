name: Build and Release Unsigned Binaries

on:
  push:
    tags:
      - 'v*' # Reagiert auf v1.15, v2.0, etc.

permissions:
  contents: write # Erlaubt das Hochladen der Dateien in die Releases

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      # Baut exakt das NOOPiOS-Target, welches die Mac-Dateien korrekt ausschließt
      # Baut exakt das NOOPiOS-Target und ignoriert kaputte App-Icons
      - name: Build Unsigned iOS App
        run: |
          xcodebuild build \
            -project Strand.xcodeproj \
            -target NOOPiOS \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/ios_output" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ASSETCATALOG_COMPILER_APPICON_NAME=""

      # Holt die App aus dem Ausgabeordner und packt sie in die .ipa
      - name: Package iOS App to .ipa
        run: |
          mkdir -p build/Payload
          cp -R build/ios_output/*.app build/Payload/
          cd build
          zip -r ../NOOP-iOS-unsigned.ipa Payload/

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: NOOP-iOS-unsigned.ipa

  # --- JOB 3: GitHub Release erstellen ---
  create-release:
    needs: [build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.ipa
          name: Release ${{ github.ref_name }}
          body: |
            ## Unsigned Community Builds (${{ github.ref_name }})
                        
            These files were generated automatically and are **not digitally signed**.
                        
            ### Installation Instructions:
            * **iOS (`.ipa`):** Since this file is unsigned, it cannot be installed directly. Use tools like **Sideloadly**, **AltServer/AltStore**, or **TrollStore** on your PC/Mac to sign the app with your own Apple ID and transfer it to your iPhone.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}