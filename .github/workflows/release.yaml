name: Build and Release Unsigned Binaries

on:
  push:
    tags:
      - 'v*' # Reagiert auf v1.15, v2.0, etc.

permissions:
  contents: write # Erlaubt das Hochladen der Dateien in die Releases

jobs:
  # --- JOB 1: Android App bauen ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Unsigned Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-unsigned-apk
          path: android/app/build/outputs/apk/release/*-unsigned.apk

  # --- JOB 2: iOS App bauen (Unsignierte .ipa) ---
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      # Wir wechseln auf das dedizierte iOS-Target, das alle korrekten Ressourcen (Icons/Pfade) besitzt
      - name: Build Unsigned iOS Archive
        run: |
          xcodebuild archive \
            -project Strand.xcodeproj \
            -target StrandiOS \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/StrandiOS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      # Packt die App aus dem Archiv in die finale .ipa
      - name: Package iOS App to .ipa
        run: |
          mkdir -p build/Payload
          cp -R build/StrandiOS.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r ../NOOP-iOS-unsigned.ipa Payload/

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: NOOP-iOS-unsigned.ipa

  # --- JOB 3: GitHub Release erstellen ---
  create-release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-unsigned-apk
          path: artifacts/

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.apk
            artifacts/*.ipa
          name: Release ${{ github.ref_name }}
          body: |
            ## Unsignierte Community-Builds (${{ github.ref_name }})
            
            Diese Dateien wurden automatisiert erstellt und sind **nicht digital signiert**.
            
            ### Installationshinweise:
            * **Android (`.apk`):** Kann direkt auf dem Smartphone installiert werden (ggf. "Installation aus unbekannten Quellen" in den Android-Einstellungen erlauben).
            * **iOS (`.ipa`):** Da diese Datei unsigniert ist, lässt sie sich nicht direkt installieren. Nutze Tools wie **Sideloadly**, **AltServer/AltStore** oder **TrollStore** auf deinem PC/Mac, um die App mit deiner eigenen Apple-ID zu signieren und auf dein iPhone zu übertragen.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}