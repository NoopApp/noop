name: macOS CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Strand/**'
      - 'StrandTests/**'
      - 'Packages/**'
      - 'project.yml'
  push:
    branches:
      - main
    paths:
      - 'Strand/**'
      - 'StrandTests/**'
      - 'Packages/**'
      - 'project.yml'

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version | grep -qF "2.45" || { echo "Unexpected XcodeGen version — expected 2.45.x"; exit 1; }

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Strand.xcodeproj \
            -scheme Strand \
            -sdk macosx \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            build

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project Strand.xcodeproj \
            -scheme Strand \
            -sdk macosx \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            test

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: noop-macos-debug
          path: build/Build/Products/Debug/NOOP.app
          retention-days: 7
          if-no-files-found: error
