name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release APK
        run: ./gradlew assembleFullRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/full/release/*.apk
          retention-days: 1
          if-no-files-found: error

  build-macos:
    name: Build macOS app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version | grep -q "2\." || { echo "Unexpected XcodeGen version"; exit 1; }

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: |
          xcodebuild \
            -scheme Strand \
            -sdk macosx \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/Build/Products/Release/NOOP.app
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-android, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## ${VERSION}/"' { found=1; next } found && /^## / { exit } found { print }' CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -50)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Download macOS app
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: dist/macos

      - name: Zip macOS app
        run: zip -r dist/NOOP-macOS-${{ github.ref_name }}.zip dist/macos/NOOP.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NOOP ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            dist/android/*.apk
            dist/NOOP-macOS-${{ github.ref_name }}.zip
